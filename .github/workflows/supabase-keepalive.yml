# ──────────────────────────────────────────────────────────────────────
# Supabase Free-Tier Keep-Alive
# ──────────────────────────────────────────────────────────────────────
# WHY THIS EXISTS:
#   Supabase pauses Free Plan projects after 7 days without real
#   database activity.  This workflow fires twice a week and makes a
#   lightweight SELECT against a dedicated "_heartbeat" table so the
#   project is never considered idle.
#
# BONUS – SELF-PRESERVATION:
#   GitHub auto-disables scheduled workflows after 60 days with no
#   repo commits.  The second job commits the run timestamp to
#   .github/keepalive-log.txt, which counts as activity and keeps
#   the schedule alive indefinitely.
#
# SECRETS REQUIRED (set in repo Settings → Secrets → Actions):
#   SUPABASE_URL            – e.g. https://xxxx.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY – the service_role key (NOT the anon key)
# ──────────────────────────────────────────────────────────────────────

name: Supabase Keep-Alive

on:
  schedule:
    # Every Monday and Thursday at 09:00 UTC
    - cron: '0 9 * * 1,4'
  workflow_dispatch:          # allow manual "Run workflow" button

permissions:
  contents: write             # needed for the commit-back step

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Query the _heartbeat table via the Supabase REST API ────
      - name: Ping Supabase database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          echo "→ Pinging $SUPABASE_URL/rest/v1/_heartbeat ..."

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/_heartbeat?select=id&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")

          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Supabase heartbeat query failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo ""
          echo "✓ Supabase is alive and responding."

      # ── 2. Commit a timestamp so the repo stays "active" ───────────
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Append heartbeat log & push
        run: |
          set -euo pipefail

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "${TIMESTAMP} | ok" >> .github/keepalive-log.txt

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/keepalive-log.txt
          git commit -m "chore: supabase keepalive heartbeat ${TIMESTAMP} [skip ci]"
          git push
